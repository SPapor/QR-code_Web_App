<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>qr/studio — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary-500: #7FB9FF;
    --primary-700: #4182E0;
    --secondary-500: #F7E66F;
    --accent-pink: #F4C9DA;

    --n-05: #FAF7F2;
    --n-10: #F1ECE3;
    --n-60: #5E5950;
    --n-90: #1A1814;
    --n-100: #0F0E0B;

    --bg: var(--n-05);
    --paper: #FFFCF6;
    --ink: var(--n-90);
    --ink-mute: var(--n-60);
    --rule: rgba(26, 24, 20, 0.12);
    --hover: rgba(127, 185, 255, 0.06);

    --serif: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;

    --r-md: 12px;
    --r-pill: 999px;

    color-scheme: light dark;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #100E0A;
      --paper: #1A1714;
      --ink: #F0EAE0;
      --ink-mute: #9F9588;
      --rule: rgba(240, 234, 224, 0.12);
      --hover: rgba(127, 185, 255, 0.08);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--secondary-500); color: var(--n-90); }

  .frame {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }
  @media (min-width: 1024px) { .frame { padding: 56px 48px 96px; } }

  /* ── Top bar ─────────────────────────────────────────────────── */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
  }
  .wordmark {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.02em;
  }
  .wordmark .slash { color: var(--ink-mute); font-weight: 300; }
  .wordmark .dot { color: var(--primary-700); }
  .user {
    display: flex; align-items: center; gap: 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    color: var(--ink-mute);
  }
  .user a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 1px;
    transition: border-color .2s ease;
  }
  .user a:hover { border-color: var(--ink); }

  /* ── Heading row ─────────────────────────────────────────────── */
  .head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    padding: 56px 0 24px;
  }
  @media (min-width: 1024px) { .head { padding: 80px 0 28px; } }

  .head h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin: 0;
  }

  .head .stat-line {
    display: block;
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .head .stat-line strong { color: var(--ink); font-weight: 600; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--n-90);
    color: var(--paper);
    padding: 13px 20px;
    border-radius: var(--r-pill);
    font-weight: 600;
    font-size: 14px;
    border: 0;
    cursor: pointer;
    font-family: var(--sans);
    letter-spacing: 0.01em;
    transition: transform .15s ease, box-shadow .2s ease;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px -10px rgba(26, 24, 20, 0.4);
  }
  @media (prefers-color-scheme: dark) {
    .btn-primary { background: var(--secondary-500); color: var(--n-100); }
  }

  /* ── List ────────────────────────────────────────────────────── */
  .list {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--rule);
    margin-top: 24px;
  }
  .row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 20px 4px;
    border-bottom: 1px solid var(--rule);
    transition: padding .2s ease, background .2s ease;
  }
  @media (min-width: 720px) {
    .row {
      grid-template-columns: 56px 48px 1.2fr 1.4fr auto auto;
      gap: 24px;
      padding: 22px 12px;
    }
  }
  .row:hover { background: var(--hover); padding-left: 20px; }

  .row .n {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
  }

  .qr-thumb {
    background: #fff;
    border-radius: 8px;
    padding: 5px;
    display: none;
    place-items: center;
    box-shadow: 0 4px 12px -8px rgba(0,0,0,0.3);
  }
  @media (min-width: 720px) { .qr-thumb { display: grid; } }
  .qr-thumb svg { display: block; }

  .row .name {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .row .name em { font-style: normal; font-weight: 400; color: var(--ink-mute); margin: 0 4px; }
  @media (prefers-color-scheme: dark) {
    .row .name em { color: var(--primary-500); }
  }

  .row .link {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
    word-break: break-all;
    display: none;
  }
  @media (min-width: 720px) { .row .link { display: block; } }
  .row .link a { color: inherit; text-decoration: none; border-bottom: 1px dashed var(--rule); }
  .row .link a:hover { color: var(--ink); border-color: var(--ink-mute); }

  .row .actions {
    display: flex;
    gap: 4px;
    justify-self: end;
  }
  .btn-icon {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 8px;
    color: var(--ink-mute);
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .btn-icon:hover { background: rgba(127, 185, 255, 0.1); color: var(--primary-700); border-color: var(--rule); }
  .btn-icon.danger:hover { background: rgba(231, 76, 60, 0.1); color: #cf3a2a; }
  @media (prefers-color-scheme: dark) {
    .btn-icon:hover { color: var(--primary-500); }
    .btn-icon.danger:hover { color: #ff8a78; }
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 24px;
    border: 1px dashed var(--rule);
    border-radius: 16px;
    margin-top: 24px;
  }
  .empty .icon {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    background: #fff;
    border-radius: 12px;
    padding: 6px;
    display: grid; place-items: center;
    box-shadow: 0 6px 18px -10px rgba(0,0,0,0.25);
  }
  .empty h2 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  .empty p {
    font-size: 14px;
    color: var(--ink-mute);
    margin: 0 0 24px;
    line-height: 1.5;
  }
</style>
</head>
