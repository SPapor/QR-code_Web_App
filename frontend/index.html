<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>qr/studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F0E0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="qr/studio">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230F0E0B'/%3E%3Cpath d='M8 8h6v6H8zM10 10v2h2v-2zM18 8h6v6h-6zM20 10v2h2v-2zM8 18h6v6H8zM10 20v2h2v-2zM18 18h2v2h-2zM22 18h2v2h-2zM20 20h2v2h-2zM18 22h2v2h-2zM22 22h2v2h-2z' fill='%23F7E66F'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Reusable fake-QR glyph (empty state) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="qr" viewBox="0 0 25 25">
    <rect width="25" height="25" fill="#fff"/>
    <path d="M0,0h7v7H0zM1,1v5h5V1zM2,2h3v3H2z" fill="#0F0E0B"/>
    <path d="M18,0h7v7h-7zM19,1v5h5V1zM20,2h3v3h-3z" fill="#0F0E0B"/>
    <path d="M0,18h7v7H0zM1,19v5h5v-5zM2,20h3v3H2z" fill="#0F0E0B"/>
    <path d="M17,17h5v5h-5zM18,18v3h3v-3zM19,19h1v1h-1z" fill="#0F0E0B"/>
    <g fill="#0F0E0B">
      <rect x="8" y="6" width="1" height="1"/><rect x="10" y="6" width="1" height="1"/>
      <rect x="12" y="6" width="1" height="1"/><rect x="14" y="6" width="1" height="1"/>
      <rect x="16" y="6" width="1" height="1"/>
      <rect x="6" y="8" width="1" height="1"/><rect x="6" y="10" width="1" height="1"/>
      <rect x="6" y="12" width="1" height="1"/><rect x="6" y="14" width="1" height="1"/>
      <rect x="6" y="16" width="1" height="1"/>
      <rect x="9" y="8" width="1" height="1"/><rect x="13" y="8" width="1" height="1"/>
      <rect x="17" y="8" width="1" height="1"/><rect x="21" y="8" width="1" height="1"/>
      <rect x="11" y="10" width="1" height="1"/><rect x="15" y="10" width="1" height="1"/>
      <rect x="19" y="10" width="1" height="1"/><rect x="9" y="12" width="1" height="1"/>
      <rect x="13" y="12" width="1" height="1"/><rect x="17" y="12" width="1" height="1"/>
      <rect x="21" y="12" width="1" height="1"/><rect x="11" y="14" width="1" height="1"/>
      <rect x="15" y="14" width="1" height="1"/><rect x="19" y="14" width="1" height="1"/>
      <rect x="9" y="16" width="1" height="1"/><rect x="13" y="16" width="1" height="1"/>
      <rect x="21" y="16" width="1" height="1"/>
      <rect x="9" y="19" width="1" height="1"/><rect x="12" y="19" width="1" height="1"/>
      <rect x="15" y="19" width="1" height="1"/><rect x="10" y="21" width="1" height="1"/>
      <rect x="13" y="21" width="1" height="1"/><rect x="9" y="23" width="1" height="1"/>
      <rect x="12" y="23" width="1" height="1"/><rect x="15" y="23" width="1" height="1"/>
    </g>
  </symbol>
</svg>

<!-- ── Top bar ───────────────────────────────────────────────────── -->
<header class="top">
  <div class="frame top-inner">
    <a class="wordmark" href="#dash">qr<span class="slash">/</span>studio<span class="dot">.</span></a>
    <div class="user">
      <span id="user-name"></span>
      <button id="btn-telegram" type="button" hidden title="Привязать этот аккаунт к Telegram-боту">Telegram ↗</button>
      <button id="btn-logout" type="button">Выйти</button>
    </div>
  </div>
</header>

<!-- ── Login ─────────────────────────────────────────────────────── -->
<section data-view id="view-login">
  <div class="auth">
    <h1>Welcome <em>back.</em></h1>
    <p class="auth-sub">Войдите, чтобы управлять своими QR-кодами</p>
    <form id="loginForm" autocomplete="off">
      <label class="field">
        <span class="field-label">Логин</span>
        <input name="username" placeholder="username" autocomplete="off" required>
      </label>
      <label class="field">
        <span class="field-label">Пароль</span>
        <span class="input-wrap">
          <input name="password" type="password" placeholder="••••••••" autocomplete="off" required>
          <button type="button" class="btn-eye" aria-label="Show password" tabindex="-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </span>
      </label>
      <button type="submit" class="btn-primary btn-block">Войти</button>
    </form>
    <div class="oauth-sep" id="oauth-divider" hidden><span>или</span></div>
    <div class="oauth">
      <div id="tg-login-slot" class="tg-slot"></div>
      <a id="btn-google" class="btn-oauth" href="/auth/google/login" hidden>
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Войти через Google
      </a>
    </div>
    <p class="auth-alt">Нет аккаунта? <a href="#reg">Создать</a></p>
  </div>
</section>

<!-- ── Register ──────────────────────────────────────────────────── -->
<section data-view id="view-reg" hidden>
  <div class="auth">
    <h1>Create <em>account.</em></h1>
    <p class="auth-sub">Минута — и ваши QR-коды под контролем</p>
    <form id="regForm">
      <label class="field">
        <span class="field-label">Логин</span>
        <input name="username" placeholder="username" autocomplete="username" required>
      </label>
      <label class="field">
        <span class="field-label">Пароль</span>
        <span class="input-wrap">
          <input name="password" type="password" placeholder="••••••••" autocomplete="new-password" required>
          <button type="button" class="btn-eye" aria-label="Show password" tabindex="-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </span>
      </label>
      <button type="submit" class="btn-primary btn-block">Создать аккаунт</button>
    </form>
    <p class="auth-alt">Уже есть аккаунт? <a href="#login">Войти</a></p>
  </div>
</section>

<!-- ── Dashboard ─────────────────────────────────────────────────── -->
<section data-view id="view-dash" hidden>
  <div class="frame">
    <div class="head">
      <div>
        <h1>Your <em>codes.</em></h1>
        <span class="stat-line"><strong id="qr-count">—</strong>&nbsp;<span id="qr-count-word">кодов</span></span>
      </div>
      <button id="btn-new" class="btn-primary" type="button">
        + Новый код
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div id="toolbar" class="toolbar" hidden>
      <input id="search" type="search" placeholder="Поиск по названию или ссылке…" autocomplete="off" aria-label="Поиск по кодам">
    </div>
    <div id="list" class="list"></div>
  </div>
</section>

<!-- ── Edit / create ─────────────────────────────────────────────── -->
<section data-view id="view-edit" hidden>
  <div class="edit">
    <h1 id="edit-title">New <em>code.</em></h1>
    <form id="editForm">
      <label class="field">
        <span class="field-label">Название</span>
        <input id="edit-name" placeholder="Menu · Mosaico" required>
      </label>
      <label class="field">
        <span class="field-label">Ссылка</span>
        <input id="edit-link" placeholder="https://…" inputmode="url" autocomplete="off" required>
      </label>
      <div class="form-actions">
        <button type="submit" class="btn-primary">Сохранить</button>
        <a href="#dash">Отмена</a>
      </div>
    </form>
  </div>
</section>

<!-- ── QR modal ──────────────────────────────────────────────────── -->
<div id="qr-modal" class="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <figure class="modal-card" role="dialog" aria-modal="true" aria-label="QR-код">
    <button class="modal-close" type="button" data-close aria-label="Закрыть">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <img id="modal-img" alt="QR-код">
    <figcaption>
      <div id="modal-name" class="modal-name"></div>
      <a id="modal-link" class="modal-link" target="_blank" rel="noopener"></a>
      <div id="modal-scans" class="modal-scans"></div>
    </figcaption>
    <a id="modal-download" class="btn-primary btn-block" download>Скачать PNG</a>
    <div class="modal-actions">
      <a id="modal-svg" download>SVG</a>
      <button id="modal-print" type="button">Печать</button>
      <button id="modal-copy" type="button">Ссылка</button>
    </div>
  </figure>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
