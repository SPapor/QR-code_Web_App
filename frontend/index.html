<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>QR-Code Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────── -->
<section data-view id="view-login">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <form id="loginForm" autocomplete="off">
      <input name="username" placeholder="Username" autocomplete="off" required>
      <div class="input-wrap">
        <input name="password" type="password" placeholder="Password" autocomplete="off" required>
        <button type="button" class="btn-eye" aria-label="Show password" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button type="submit">Log in</button>
    </form>
    <p>No account? <a href="#reg">Register here</a></p>
  </div>
</section>

<!-- ── Register ──────────────────────────────────────────────────── -->
<section data-view id="view-reg" hidden>
  <div class="auth-card">
    <h1>Create account</h1>
    <form id="regForm">
      <input name="username" placeholder="Username" autocomplete="username" required>
      <div class="input-wrap">
        <input name="password" type="password" placeholder="Password" autocomplete="new-password" required>
        <button type="button" class="btn-eye" aria-label="Show password" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button type="submit">Register</button>
    </form>
    <p>Have an account? <a href="#login">Back to login</a></p>
  </div>
</section>

<!-- ── Dashboard ─────────────────────────────────────────────────── -->
<section data-view id="view-dash" hidden>
  <header class="topbar">
    <h1>Your QR codes</h1>
    <button id="btn-logout" class="btn-ghost">Logout</button>
  </header>

  <button id="btn-new" class="btn-primary">+ New QR</button>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Link</th>
          <th>QR</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="list"><tr><td colspan="4">Loading…</td></tr></tbody>
    </table>
  </div>

  <div id="preview"></div>
</section>

<!-- ── Edit ───────────────────────────────────────────────────────── -->
<section data-view id="view-edit" hidden>
  <h1>Edit QR</h1>
  <form id="editForm">
    <input id="edit-name" placeholder="Name" required>
    <input id="edit-link" placeholder="Link (https://…)" required>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Save</button>
      <a href="#dash">Cancel</a>
    </div>
  </form>
</section>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
