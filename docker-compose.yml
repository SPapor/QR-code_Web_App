# pinned so any checkout location (dev dir, CI runner workspace) maps to the
# same compose project and reuses the same containers and volumes
name: qr-menu

services:
  backend:
    build:
      context: ./app
    env_file: .env
    environment:
      # db_data was historically mounted over /app (shadowing the image code);
      # it is now mounted at /data, where its root already holds database.sqlite
      - DB_URI=sqlite+aiosqlite:////data/database.sqlite
    volumes:
      - db_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: ./bot
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
      - SESSION_DB_PATH=/data/bot_sessions.sqlite
    volumes:
      - bot_data:/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  db_backup:
    build:
      context: ./app
    # BOT_TOKEN + BACKUP_TELEGRAM_CHAT_ID in .env enable the offsite copy to Telegram
    env_file: .env
    command: ["python", "backup_db.py", "--db", "/data/database.sqlite", "--dir", "/backups", "--interval", "86400", "--keep", "14"]
    volumes:
      - db_data:/data:ro
      # host directory, deliberately outside docker volumes: survives `docker volume rm`
      - ${QR_BACKUP_DIR:-~/qr-menu-backups}:/backups
    depends_on:
      - backend
    restart: unless-stopped

  urls:
    image: busybox
    depends_on:
      - frontend
    command: >
      sh -c '
        echo "" &&
        echo "  ┌─────────────────────────────────────────┐" &&
        echo "  │  Backend   →  http://localhost:8000     │" &&
        echo "  │  Frontend  →  http://localhost:3000     │" &&
        echo "  └─────────────────────────────────────────┘" &&
        echo ""
      '
    restart: "no"

volumes:
  db_data:
  bot_data:
