[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
pythonpath = "app"
testpaths = ["tests"]

[tool.isort]
profile = "black"
src_paths = ["app"]

[tool.mypy]
python_version = "3.12"
mypy_path = "app"
explicit_package_bases = true
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["\\.venv", "migrations"]
