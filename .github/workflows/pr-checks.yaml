name: CI
on:
  pull_request:
  push:
    branches: [dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.advisory }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: check-black
            advisory: true
          - check: check-isort
            advisory: true
          - check: check-flake8
            advisory: false
          - check: check-mypy
            advisory: false
    name: ${{ matrix.check }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Copy ci-env
        run: cp ci-env .env

      - name: Run ${{ matrix.check }}
        run: make ${{ matrix.check }}

  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Copy ci-env
        run: cp ci-env .env

      - name: Run pytest
        run: make pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

      - name: Type-check and build
        run: npm run build
        working-directory: frontend
