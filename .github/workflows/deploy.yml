name: Deploy
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use production env
        run: cp "$HOME/.config/qr-menu/.env" .env

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Smoke check
        run: |
          sleep 5
          curl -fsS -o /dev/null http://localhost:3000/
          curl -fsS -o /dev/null http://localhost:8000/docs

      - name: Prune dangling images
        run: docker image prune -f
